<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>清掃完了報告</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a73e8;
      --green: #34a853;
      --red: #ea4335;
      --bg: #f5f7fa;
      --card: #ffffff;
      --border: #e0e0e0;
      --text: #202124;
      --sub: #5f6368;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--blue);
      color: white;
      padding: 20px 16px;
      padding-top: calc(20px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    header p { font-size: 12px; opacity: 0.85; }
    .content { padding: 12px 16px 100px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--bg); }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 6px; margin-top: 14px; }
    label:first-of-type { margin-top: 0; }
    select, input[type="text"] {
      width: 100%; padding: 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 15px; font-family: inherit;
      background: var(--bg); color: var(--text);
      appearance: none; -webkit-appearance: none;
    }
    select:focus, input:focus { outline: none; border-color: var(--blue); background: white; }

    /* 写真撮影エリア */
    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .photo-item { display: flex; flex-direction: column; gap: 6px; }
    .photo-label-text { font-size: 12px; font-weight: 600; color: var(--sub); }
    .photo-btn {
      aspect-ratio: 4/3; border: 2px dashed var(--border);
      border-radius: 10px; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden; position: relative;
    }
    .photo-btn.taken { border: 2px solid var(--green); }
    .photo-btn img { width: 100%; height: 100%; object-fit: cover; }
    .photo-btn .icon { font-size: 28px; }
    .photo-btn .hint { font-size: 11px; color: var(--sub); margin-top: 4px; }
    .photo-btn input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .required-badge {
      font-size: 10px; background: var(--red); color: white;
      padding: 2px 6px; border-radius: 4px; margin-left: 4px;
    }

    /* 進捗バー */
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
    .progress-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width 0.3s; }

    /* 送信ボタン */
    .submit-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
    }
    .submit-btn {
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      background: var(--blue); color: white;
    }
    .submit-btn:disabled { background: var(--border); color: var(--sub); cursor: not-allowed; }
    .submit-btn:not(:disabled):active { transform: scale(0.98); }

    /* 完了画面 */
    #done-screen {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
      padding: 24px; text-align: center; gap: 16px;
    }
    #done-screen .done-icon { font-size: 72px; }
    #done-screen h2 { font-size: 24px; font-weight: 700; }
    #done-screen p { color: var(--sub); font-size: 14px; line-height: 1.6; }
    .retry-btn {
      padding: 14px 32px; border: 1px solid var(--border);
      border-radius: 10px; font-size: 14px; font-family: inherit;
      background: white; cursor: pointer; color: var(--text); margin-top: 8px;
    }

    /* ローディング */
    #loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(255,255,255,0.9);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 100;
    }
    .spinner {
      width: 48px; height: 48px; border: 4px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay p { color: var(--sub); font-size: 14px; }
  </style>
</head>
<body>

<div id="main-screen">
  <header>
    <div style="font-size:32px">🧹</div>
    <div>
      <h1>清掃完了報告</h1>
      <p>全項目を入力して送信してください</p>
    </div>
  </header>

  <div class="content">
    <!-- 進捗 -->
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <!-- 基本情報 -->
    <div class="card">
      <div class="card-title">📋 基本情報</div>
      <label>物件名 <span class="required-badge">必須</span></label>
      <select id="property-name" onchange="onPropertyChange()">
        <option value="">選択してください</option>
      </select>
      <label>部屋番号 <span class="required-badge">必須</span></label>
      <select id="room-number" disabled>
        <option value="">物件を先に選択</option>
      </select>
      <label>担当者名 <span class="required-badge">必須</span></label>
      <input type="text" id="cleaner-name" placeholder="山田 太郎" />
    </div>

    <!-- 写真撮影 -->
    <div class="card">
      <div class="card-title">📸 清掃写真</div>
      <div class="photo-grid">
        <div class="photo-item">
          <div class="photo-label-text">清掃前 <span class="required-badge">必須</span></div>
          <div class="photo-btn" id="btn-before">
            <div class="icon">📷</div>
            <div class="hint">タップして撮影</div>
            <input type="file" accept="image/*" capture="environment" onchange="onPhotoSelect(this,'before')" />
          </div>
        </div>
        <div class="photo-item">
          <div class="photo-label-text">清掃後 <span class="required-badge">必須</span></div>
          <div class="photo-btn" id="btn-after">
            <div class="icon">📷</div>
            <div class="hint">タップして撮影</div>
            <input type="file" accept="image/*" capture="environment" onchange="onPhotoSelect(this,'after')" />
          </div>
        </div>
        <div class="photo-item">
          <div class="photo-label-text">玄関</div>
          <div class="photo-btn" id="btn-entrance">
            <div class="icon">🚪</div>
            <div class="hint">タップして撮影</div>
            <input type="file" accept="image/*" capture="environment" onchange="onPhotoSelect(this,'entrance')" />
          </div>
        </div>
        <div class="photo-item">
          <div class="photo-label-text">キッチン</div>
          <div class="photo-btn" id="btn-kitchen">
            <div class="icon">🍳</div>
            <div class="hint">タップして撮影</div>
            <input type="file" accept="image/*" capture="environment" onchange="onPhotoSelect(this,'kitchen')" />
          </div>
        </div>
        <div class="photo-item">
          <div class="photo-label-text">浴室</div>
          <div class="photo-btn" id="btn-bathroom">
            <div class="icon">🛁</div>
            <div class="hint">タップして撮影</div>
            <input type="file" accept="image/*" capture="environment" onchange="onPhotoSelect(this,'bathroom')" />
          </div>
        </div>
        <div class="photo-item">
          <div class="photo-label-text">トイレ</div>
          <div class="photo-btn" id="btn-toilet">
            <div class="icon">🚽</div>
            <div class="hint">タップして撮影</div>
            <input type="file" accept="image/*" capture="environment" onchange="onPhotoSelect(this,'toilet')" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="submit-area">
    <button class="submit-btn" id="submit-btn" disabled onclick="submitReport()">
      必須項目を入力してください
    </button>
  </div>
</div>

<!-- 完了画面 -->
<div id="done-screen">
  <div class="done-icon">✅</div>
  <h2>報告完了！</h2>
  <p>管理者に通知を送りました。<br>お疲れ様でした。</p>
  <button class="retry-btn" onclick="resetForm()">続けて別の部屋を報告</button>
</div>

<!-- ローディング -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p>送信中... しばらくお待ちください</p>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzIEfUMpaOVsMcKOwEQnIIrDa_oqx2Cbz0DmeUKiacrAfsTr_ScoImhbJb8kgIXA2ls2Q/exec';

// 物件マスタ（スプレッドシートから手動同期、または自動取得）
var PROPERTIES = {
  'コーポ諏訪':  ['101','102','103','201','202','203'],
  'ハイツ渋谷':  ['101','102','201','202'],
};

var photos = {};

// 物件プルダウンを初期化
window.onload = function() {
  var sel = document.getElementById('property-name');
  Object.keys(PROPERTIES).forEach(function(name) {
    var opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
};

function onPropertyChange() {
  var prop = document.getElementById('property-name').value;
  var roomSel = document.getElementById('room-number');
  roomSel.innerHTML = '';
  if (!prop) {
    roomSel.innerHTML = '<option value="">物件を先に選択</option>';
    roomSel.disabled = true;
  } else {
    var rooms = PROPERTIES[prop] || [];
    rooms.forEach(function(r) {
      var opt = document.createElement('option');
      opt.value = r;
      opt.textContent = r + '号室';
      roomSel.appendChild(opt);
    });
    roomSel.disabled = false;
  }
  updateSubmitButton();
}

function onPhotoSelect(input, key) {
  var file = input.files[0];
  if (!file) return;

  // リサイズして保存
  resizeImage(file, 1200, function(dataUrl) {
    photos[key] = { label: getLabelName(key), dataUrl: dataUrl };
    var btn = document.getElementById('btn-' + key);
    btn.classList.add('taken');
    btn.innerHTML = '<img src="' + dataUrl + '" alt="' + key + '">' +
      '<input type="file" accept="image/*" capture="environment" onchange="onPhotoSelect(this,\'' + key + '\')" />';
    updateSubmitButton();
  });
}

function getLabelName(key) {
  var map = { before:'清掃前', after:'清掃後', entrance:'玄関', kitchen:'キッチン', bathroom:'浴室', toilet:'トイレ' };
  return map[key] || key;
}

function resizeImage(file, maxSize, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      callback(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function updateSubmitButton() {
  var prop    = document.getElementById('property-name').value;
  var room    = document.getElementById('room-number').value;
  var cleaner = document.getElementById('cleaner-name').value.trim();
  var hasBefore = !!photos['before'];
  var hasAfter  = !!photos['after'];

  var total = (prop?1:0) + (room?1:0) + (cleaner?1:0) + (hasBefore?1:0) + (hasAfter?1:0);
  var pct = Math.round(total / 5 * 100);
  document.getElementById('progress-fill').style.width = pct + '%';

  var btn = document.getElementById('submit-btn');
  var ready = prop && room && cleaner && hasBefore && hasAfter;
  btn.disabled = !ready;
  btn.textContent = ready ? '✅ 清掃完了を報告する' : '必須項目（清掃前後の写真）を入力してください';
  btn.style.background = ready ? '#1a73e8' : '';
}

document.getElementById('cleaner-name').addEventListener('input', updateSubmitButton);
document.getElementById('room-number').addEventListener('change', updateSubmitButton);

async function submitReport() {
  var prop    = document.getElementById('property-name').value;
  var room    = document.getElementById('room-number').value;
  var cleaner = document.getElementById('cleaner-name').value.trim();

  document.getElementById('loading-overlay').style.display = 'flex';

  var photoList = Object.values(photos).map(function(p) {
    return { label: p.label, dataUrl: p.dataUrl };
  });

  try {
    var res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'cleaning_complete',
        property_name: prop,
        room_number: room,
        cleaner_name: cleaner,
        timestamp: new Date().toLocaleString('ja-JP'),
        photos: photoList
      })
    });
    var data = await res.json();
    document.getElementById('loading-overlay').style.display = 'none';
    if (data.success) {
      document.getElementById('main-screen').style.display = 'none';
      document.getElementById('done-screen').style.display = 'flex';
    } else {
      alert('送信エラー: ' + (data.error || '不明'));
    }
  } catch(err) {
    document.getElementById('loading-overlay').style.display = 'none';
    alert('送信に失敗しました。電波状況を確認して再試行してください。\n' + err.message);
  }
}

function resetForm() {
  photos = {};
  document.getElementById('property-name').value = '';
  document.getElementById('room-number').innerHTML = '<option value="">物件を先に選択</option>';
  document.getElementById('room-number').disabled = true;
  document.getElementById('cleaner-name').value = '';
  ['before','after','entrance','kitchen','bathroom','toilet'].forEach(function(k) {
    var btn = document.getElementById('btn-' + k);
    var icons = { before:'📷', after:'📷', entrance:'🚪', kitchen:'🍳', bathroom:'🛁', toilet:'🚽' };
    btn.className = 'photo-btn';
    btn.innerHTML = '<div class="icon">' + icons[k] + '</div><div class="hint">タップして撮影</div>' +
      '<input type="file" accept="image/*" capture="environment" onchange="onPhotoSelect(this,\'' + k + '\')" />';
  });
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('done-screen').style.display = 'none';
  updateSubmitButton();
}
</script>
</body>
</html>

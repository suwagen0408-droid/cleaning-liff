<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理ダッシュボード</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a73e8;
      --approve: #34a853;
      --reject:  #ea4335;
      --warning: #fbbc04;
      --bg:      #f5f7fa;
      --card:    #ffffff;
      --text:    #202124;
      --sub:     #5f6368;
      --border:  #e0e0e0;
      --radius:  10px;
      --shadow:  0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Header ---- */
    .app-header {
      background: #202124;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .app-header h1 { font-size: 17px; font-weight: 700; }
    .header-sub { font-size: 12px; opacity: 0.55; margin-left: auto; }

    /* ---- Tabs ---- */
    .tabs-nav {
      background: white;
      border-bottom: 2px solid var(--border);
      display: flex;
      padding: 0 20px;
      overflow-x: auto;
      gap: 0;
    }
    .tab-btn {
      padding: 13px 18px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ---- Panel ---- */
    .tab-panel { display: none; padding: 20px; }
    .tab-panel.active { display: block; }

    /* ---- Toolbar ---- */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-size: 15px; font-weight: 700; flex: 1; min-width: 100px; }

    /* ---- Filter chips ---- */
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: white;
      color: var(--sub);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .chip.active           { background: var(--primary); color: white; border-color: var(--primary); }
    .chip.chip-warn.active { background: #f59e0b; color: white; border-color: #f59e0b; }
    .chip.chip-ok.active   { background: var(--approve); color: white; border-color: var(--approve); }
    .chip.chip-ng.active   { background: var(--reject);  color: white; border-color: var(--reject); }

    /* ---- Buttons ---- */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-outline { background: white; border: 1px solid var(--border); color: var(--text); }
    .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }

    /* ---- Table ---- */
    .table-wrap {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th, td {
      padding: 11px 14px;
      text-align: left;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    th {
      background: #f8f9fa;
      font-weight: 700;
      color: var(--sub);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbff; }
    .center { text-align: center; }
    .muted  { color: var(--sub); font-size: 12px; }

    /* ---- Badges ---- */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-pending  { background: #fff8e1; color: #92400e; }
    .badge-approved { background: #e6f4ea; color: #1e7e34; }
    .badge-rejected { background: #fce8e6; color: #c5221f; }
    .badge-active   { background: #e6f4ea; color: #1e7e34; }
    .badge-inactive { background: #f5f5f5; color: #999; }

    /* ---- LINE status ---- */
    .line-ok { color: var(--approve); font-size: 12px; font-weight: 700; }
    .line-ng { color: var(--reject);  font-size: 12px; font-weight: 700; }

    /* ---- Amenity dots ---- */
    .dot-row { display: flex; gap: 3px; align-items: center; }
    .dot { width: 11px; height: 11px; border-radius: 50%; background: #e0e0e0; }
    .dot.lv1 { background: #ea4335; }
    .dot.lv2 { background: #ff7043; }
    .dot.lv3 { background: #fbbc04; }
    .dot.lv4 { background: #66bb6a; }
    .dot.lv5 { background: #34a853; }

    /* ---- Empty / Loading ---- */
    .msg-row td {
      text-align: center;
      color: var(--sub);
      padding: 36px 16px;
      font-size: 13px;
    }

    /* ---- Modal ---- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadein 0.15s ease;
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .modal-box {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      width: 92%;
      max-width: 440px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
      animation: slideup 0.18s ease;
    }
    @keyframes slideup {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ---- Form ---- */
    .form-group { margin-bottom: 13px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
    }
    .form-input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
    }
    .form-input:focus { outline: none; border-color: var(--primary); background: white; }
    .form-input:disabled { opacity: 0.6; cursor: not-allowed; }
    .form-hint { font-size: 11px; color: var(--sub); margin-top: 4px; }

    @media (max-width: 600px) {
      .tab-panel { padding: 14px 12px; }
      .tabs-nav  { padding: 0 12px; }
      .app-header { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <span style="font-size:22px">🏠</span>
  <h1>管理ダッシュボード</h1>
  <span class="header-sub">清掃業務管理システム</span>
</header>

<nav class="tabs-nav">
  <button class="tab-btn active" onclick="switchTab('logs',this)">📋 清掃ログ</button>
  <button class="tab-btn" onclick="switchTab('properties',this)">🏠 物件マスタ</button>
  <button class="tab-btn" onclick="switchTab('cleaners',this)">👤 清掃員マスタ</button>
  <button class="tab-btn" onclick="switchTab('amenity',this)">🧴 アメニティ在庫</button>
</nav>

<!-- ===== 清掃ログ ===== -->
<div id="tab-logs" class="tab-panel active">
  <div class="toolbar">
    <span class="toolbar-title">清掃ログ</span>
    <div class="chips">
      <button class="chip active"    onclick="filterLogs('all',this)">すべて</button>
      <button class="chip chip-warn" onclick="filterLogs('pending',this)">🕐 保留</button>
      <button class="chip chip-ok"   onclick="filterLogs('approved',this)">✅ 承認済み</button>
      <button class="chip chip-ng"   onclick="filterLogs('rejected',this)">🔄 差し戻し</button>
    </div>
    <button class="btn btn-outline btn-sm" onclick="loadLogs()">🔄 更新</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>日時</th>
          <th>物件</th>
          <th>部屋</th>
          <th>清掃員</th>
          <th>ステータス</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="logs-tbody">
        <tr class="msg-row"><td colspan="6">読み込み中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ===== 物件マスタ ===== -->
<div id="tab-properties" class="tab-panel">
  <div class="toolbar">
    <span class="toolbar-title">物件マスタ</span>
    <button class="btn btn-primary btn-sm" onclick="openModal('modal-add-property')">＋ 物件追加</button>
    <button class="btn btn-outline btn-sm" onclick="loadProperties()">🔄 更新</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>物件名</th>
          <th>部屋番号</th>
          <th>オーナー</th>
          <th>管理者LINE</th>
          <th>オーナーLINE</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="properties-tbody">
        <tr class="msg-row"><td colspan="6">読み込み中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ===== 清掃員マスタ ===== -->
<div id="tab-cleaners" class="tab-panel">
  <div class="toolbar">
    <span class="toolbar-title">清掃員マスタ</span>
    <button class="btn btn-primary btn-sm" onclick="openModal('modal-add-cleaner')">＋ 清掃員追加</button>
    <button class="btn btn-outline btn-sm" onclick="loadCleaners()">🔄 更新</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>清掃員名</th>
          <th>LINE ID</th>
          <th>電話番号</th>
          <th>状態</th>
        </tr>
      </thead>
      <tbody id="cleaners-tbody">
        <tr class="msg-row"><td colspan="4">読み込み中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ===== アメニティ在庫 ===== -->
<div id="tab-amenity" class="tab-panel">
  <div class="toolbar">
    <span class="toolbar-title">アメニティ在庫（最新）</span>
    <button class="btn btn-outline btn-sm" onclick="loadAmenity()">🔄 更新</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>物件</th>
          <th>部屋</th>
          <th>記録日</th>
          <th>シーツ</th>
          <th>掛け布団</th>
          <th>枕カバー</th>
          <th>バスタオル</th>
          <th>タオル</th>
          <th>歯ブラシ</th>
        </tr>
      </thead>
      <tbody id="amenity-tbody">
        <tr class="msg-row"><td colspan="9">読み込み中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ===== Modal: 物件追加 ===== -->
<div id="modal-add-property" class="modal-overlay" style="display:none" onclick="overlayClose(event,'modal-add-property')">
  <div class="modal-box">
    <h3>🏠 物件追加</h3>
    <div class="form-group">
      <label class="form-label">物件名 *</label>
      <input id="p-name" type="text" class="form-input" placeholder="コーポ諏訪" />
    </div>
    <div class="form-group">
      <label class="form-label">部屋番号 *</label>
      <input id="p-rooms" type="text" class="form-input" placeholder="101/102/103" />
      <p class="form-hint">スラッシュ区切りで入力</p>
    </div>
    <div class="form-group">
      <label class="form-label">オーナー名</label>
      <input id="p-owner" type="text" class="form-input" placeholder="山田 一郎" />
    </div>
    <div class="form-group">
      <label class="form-label">住所</label>
      <input id="p-address" type="text" class="form-input" placeholder="東京都..." />
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-add-property')">キャンセル</button>
      <button class="btn btn-primary" onclick="submitAddProperty()">追加する</button>
    </div>
  </div>
</div>

<!-- ===== Modal: 部屋番号編集 ===== -->
<div id="modal-edit-rooms" class="modal-overlay" style="display:none" onclick="overlayClose(event,'modal-edit-rooms')">
  <div class="modal-box">
    <h3>🚪 部屋番号を編集</h3>
    <input type="hidden" id="edit-prop-name" />
    <div class="form-group">
      <label class="form-label">物件名</label>
      <input id="edit-prop-display" type="text" class="form-input" disabled />
    </div>
    <div class="form-group">
      <label class="form-label">部屋番号 *</label>
      <input id="edit-prop-rooms" type="text" class="form-input" placeholder="101/102/103" />
      <p class="form-hint">スラッシュ区切りで入力</p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-edit-rooms')">キャンセル</button>
      <button class="btn btn-primary" onclick="submitEditRooms()">保存する</button>
    </div>
  </div>
</div>

<!-- ===== Modal: 清掃員追加 ===== -->
<div id="modal-add-cleaner" class="modal-overlay" style="display:none" onclick="overlayClose(event,'modal-add-cleaner')">
  <div class="modal-box">
    <h3>👤 清掃員追加</h3>
    <div class="form-group">
      <label class="form-label">清掃員名 *</label>
      <input id="c-name" type="text" class="form-input" placeholder="山田 太郎" />
    </div>
    <div class="form-group">
      <label class="form-label">電話番号</label>
      <input id="c-phone" type="tel" class="form-input" placeholder="090-0000-0000" />
    </div>
    <p class="form-hint" style="margin-bottom:4px">※ LINE IDはボットに「登録 名前」と送ると自動登録されます</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-add-cleaner')">キャンセル</button>
      <button class="btn btn-primary" onclick="submitAddCleaner()">追加する</button>
    </div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzIEfUMpaOVsMcKOwEQnIIrDa_oqx2Cbz0DmeUKiacrAfsTr_ScoImhbJb8kgIXA2ls2Q/exec';

var allLogs   = [];
var logsFilter = 'all';
var loaded    = {};

// ============================================================
// Tab
// ============================================================
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  if (!loaded[name]) {
    loaded[name] = true;
    if (name === 'logs')       loadLogs();
    if (name === 'properties') loadProperties();
    if (name === 'cleaners')   loadCleaners();
    if (name === 'amenity')    loadAmenity();
  }
}

// ============================================================
// 清掃ログ
// ============================================================
function loadLogs() {
  loaded.logs = true;
  tbody('logs-tbody', loading(6));
  get('logs').then(function(d) {
    allLogs = (d.logs || []);
    renderLogs();
  }).catch(function(e) { tbody('logs-tbody', err(6, e)); });
}

function filterLogs(status, btn) {
  logsFilter = status;
  document.querySelectorAll('#tab-logs .chip').forEach(function(c) { c.classList.remove('active'); });
  btn.classList.add('active');
  renderLogs();
}

function renderLogs() {
  var rows = logsFilter === 'all' ? allLogs
    : allLogs.filter(function(r) { return r.status === logsFilter; });
  if (!rows.length) { tbody('logs-tbody', empty(6, 'データがありません')); return; }
  tbody('logs-tbody', rows.map(function(r) {
    var badge = r.status === 'approved'
      ? '<span class="badge badge-approved">✅ 承認済み</span>'
      : r.status === 'rejected'
      ? '<span class="badge badge-rejected">🔄 差し戻し</span>'
      : '<span class="badge badge-pending">🕐 保留中</span>';
    var link = '<a href="index.html?record_id=' + e(r.record_id) + '" target="_blank" class="btn btn-' +
      (r.status === 'pending' ? 'primary' : 'outline') + ' btn-sm">' +
      (r.status === 'pending' ? '承認ページ' : '詳細') + '</a>';
    return '<tr><td>' + fmtDate(r.timestamp) + '</td><td>' + e(r.property_name) +
      '</td><td>' + e(r.room_number) + '</td><td>' + e(r.cleaner_name) +
      '</td><td>' + badge + '</td><td>' + link + '</td></tr>';
  }).join(''));
}

// ============================================================
// 物件マスタ
// ============================================================
function loadProperties() {
  loaded.properties = true;
  tbody('properties-tbody', loading(6));
  get('properties').then(function(d) {
    var props = d.properties || [];
    if (!props.length) { tbody('properties-tbody', empty(6, '物件がありません')); return; }
    tbody('properties-tbody', props.map(function(p) {
      var mgr = p.manager_line_group_id ? '✅ 設定済み' : '<span class="muted">未設定</span>';
      var own = p.owner_line_group_id   ? '✅ 設定済み' : '<span class="muted">未設定</span>';
      return '<tr>' +
        '<td><strong>' + e(p.property_name) + '</strong></td>' +
        '<td class="muted">' + e(p.rooms || '-') + '</td>' +
        '<td class="muted">' + e(p.owner_name || '-') + '</td>' +
        '<td style="font-size:12px">' + mgr + '</td>' +
        '<td style="font-size:12px">' + own + '</td>' +
        '<td><button class="btn btn-outline btn-sm" onclick=\'openEditRooms(' +
          JSON.stringify(p.property_name) + ',' + JSON.stringify(p.rooms || '') +
          ')\'>部屋編集</button></td>' +
        '</tr>';
    }).join(''));
  }).catch(function(e2) { tbody('properties-tbody', err(6, e2)); });
}

function openEditRooms(name, rooms) {
  document.getElementById('edit-prop-name').value = name;
  document.getElementById('edit-prop-display').value = name;
  document.getElementById('edit-prop-rooms').value = rooms;
  openModal('modal-edit-rooms');
}

function submitAddProperty() {
  var name    = val('p-name');
  var rooms   = val('p-rooms');
  var owner   = val('p-owner');
  var address = val('p-address');
  if (!name || !rooms) { alert('物件名と部屋番号は必須です'); return; }
  post({ action: 'add_property', property_name: name, rooms: rooms, owner_name: owner, address: address })
    .then(function() {
      closeModal('modal-add-property');
      loaded.properties = false;
      loadProperties();
    }).catch(function(e2) { alert('エラー: ' + e2.message); });
}

function submitEditRooms() {
  var name  = document.getElementById('edit-prop-name').value;
  var rooms = val('edit-prop-rooms');
  if (!rooms) { alert('部屋番号を入力してください'); return; }
  post({ action: 'update_property', property_name: name, rooms: rooms })
    .then(function() {
      closeModal('modal-edit-rooms');
      loaded.properties = false;
      loadProperties();
    }).catch(function(e2) { alert('エラー: ' + e2.message); });
}

// ============================================================
// 清掃員マスタ
// ============================================================
function loadCleaners() {
  loaded.cleaners = true;
  tbody('cleaners-tbody', loading(4));
  get('cleaners_full').then(function(d) {
    var list = d.cleaners || [];
    if (!list.length) { tbody('cleaners-tbody', empty(4, '清掃員がいません')); return; }
    tbody('cleaners-tbody', list.map(function(c) {
      var lineStr = c.line_user_id
        ? '<span class="line-ok">✅ 登録済み</span>'
        : '<span class="line-ng">❌ 未登録</span>';
      var activeStr = (c.active === false || String(c.active).toUpperCase() === 'FALSE')
        ? '<span class="badge badge-inactive">無効</span>'
        : '<span class="badge badge-active">有効</span>';
      return '<tr>' +
        '<td><strong>' + e(c.cleaner_name) + '</strong></td>' +
        '<td>' + lineStr + '</td>' +
        '<td class="muted">' + e(c.phone || '-') + '</td>' +
        '<td>' + activeStr + '</td>' +
        '</tr>';
    }).join(''));
  }).catch(function(e2) { tbody('cleaners-tbody', err(4, e2)); });
}

function submitAddCleaner() {
  var name  = val('c-name');
  var phone = val('c-phone');
  if (!name) { alert('清掃員名は必須です'); return; }
  post({ action: 'add_cleaner', cleaner_name: name, phone: phone })
    .then(function() {
      closeModal('modal-add-cleaner');
      loaded.cleaners = false;
      loadCleaners();
    }).catch(function(e2) { alert('エラー: ' + e2.message); });
}

// ============================================================
// アメニティ在庫
// ============================================================
function loadAmenity() {
  loaded.amenity = true;
  tbody('amenity-tbody', loading(9));
  get('amenity_latest').then(function(d) {
    var rows = d.amenity || [];
    if (!rows.length) { tbody('amenity-tbody', empty(9, 'データがありません')); return; }
    tbody('amenity-tbody', rows.map(function(r) {
      return '<tr>' +
        '<td><strong>' + e(r.property_name) + '</strong></td>' +
        '<td class="muted">' + e(r.room_number) + '</td>' +
        '<td class="muted" style="font-size:11px">' + e(r.date || '') + '</td>' +
        '<td>' + dots(r.sheets) + '</td>' +
        '<td>' + dots(r.duvet_cover) + '</td>' +
        '<td>' + dots(r.pillow_cover) + '</td>' +
        '<td>' + dots(r.bath_towel) + '</td>' +
        '<td>' + dots(r.towel) + '</td>' +
        '<td>' + dots(r.toothbrush) + '</td>' +
        '</tr>';
    }).join(''));
  }).catch(function(e2) { tbody('amenity-tbody', err(9, e2)); });
}

function dots(level) {
  var n = Math.max(0, Math.min(5, parseInt(level, 10) || 0));
  var h = '<div class="dot-row">';
  for (var i = 1; i <= 5; i++) {
    h += '<div class="dot' + (i <= n ? ' lv' + n : '') + '"></div>';
  }
  return h + '</div>';
}

// ============================================================
// Modal helpers
// ============================================================
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function overlayClose(ev, id) { if (ev.target === ev.currentTarget) closeModal(id); }

// ============================================================
// Fetch helpers
// ============================================================
function get(action) {
  return fetch(GAS_URL + '?action=' + action)
    .then(function(r) { return r.json(); })
    .then(function(d) { if (!d.success) throw new Error(d.error || 'error'); return d; });
}
function post(payload) {
  return fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
    .then(function(r) { return r.json(); })
    .then(function(d) { if (!d.success) throw new Error(d.error || 'error'); return d; });
}

// ============================================================
// UI helpers
// ============================================================
function tbody(id, html) { document.getElementById(id).innerHTML = html; }
function loading(cols) { return '<tr class="msg-row"><td colspan="' + cols + '">読み込み中...</td></tr>'; }
function empty(cols, msg) { return '<tr class="msg-row"><td colspan="' + cols + '">' + msg + '</td></tr>'; }
function err(cols, e2)   { return '<tr class="msg-row"><td colspan="' + cols + '">⚠️ ' + e2.message + '</td></tr>'; }
function val(id) { return document.getElementById(id).value.trim(); }
function e(s) {
  return String(s || '').replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[c];
  });
}
function fmtDate(ts) {
  if (!ts) return '-';
  try {
    var d = new Date(ts);
    return d.getFullYear() + '/' +
      String(d.getMonth() + 1).padStart(2, '0') + '/' +
      String(d.getDate()).padStart(2, '0') + ' ' +
      String(d.getHours()).padStart(2, '0') + ':' +
      String(d.getMinutes()).padStart(2, '0');
  } catch(_) { return String(ts); }
}

// 初期ロード
loaded.logs = true;
loadLogs();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>写真の撮り直し</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #f57c00;
      --bg: #f0f2f5;
      --card: #fff;
      --border: #e0e0e0;
      --text: #202124;
      --sub: #5f6368;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    header {
      background: var(--orange); color: white;
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header p  { font-size: 11px; opacity: 0.85; }

    .content { padding: 16px 14px 120px; display: flex; flex-direction: column; gap: 12px; }

    .card { background: var(--card); border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    .note-box {
      background: #fff8e1; border-radius: 10px; padding: 14px;
      border-left: 4px solid var(--orange);
    }
    .note-title { font-size: 11px; font-weight: 700; color: var(--orange); margin-bottom: 6px; }
    .note-text  { font-size: 14px; line-height: 1.6; color: var(--text); }

    .photo-area {
      aspect-ratio: 4/3; border: 2px dashed var(--border);
      border-radius: 10px; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden; position: relative;
    }
    .photo-area.taken { border: 2px solid var(--orange); }
    .photo-area img { width: 100%; height: 100%; object-fit: cover; }
    .photo-area .icon { font-size: 40px; margin-bottom: 8px; }
    .photo-area .hint { font-size: 13px; color: var(--sub); font-weight: 600; }
    .photo-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .retake-label { font-size: 12px; color: var(--sub); text-align: center; margin-top: 6px; }

    .submit-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
    }
    .submit-btn {
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; font-family: inherit;
      cursor: pointer; background: var(--orange); color: white;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { background: var(--border); color: var(--sub); cursor: not-allowed; }

    #done-screen {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
      padding: 24px; text-align: center; gap: 16px;
    }
    #done-screen .done-icon { font-size: 72px; }
    #done-screen h2 { font-size: 24px; font-weight: 700; }
    #done-screen p  { color: var(--sub); font-size: 14px; line-height: 1.6; }

    #error-screen {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
      padding: 24px; text-align: center; gap: 12px;
    }
    #error-screen .icon { font-size: 48px; }
    #error-screen p { color: var(--sub); font-size: 14px; }

    #loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(255,255,255,0.93);
      flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100;
    }
    .spinner {
      width: 48px; height: 48px; border: 4px solid var(--border);
      border-top-color: var(--orange); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { color: var(--sub); font-size: 13px; }
  </style>
</head>
<body>

<!-- メイン -->
<div id="main-screen">
  <header>
    <div style="font-size:28px">📸</div>
    <div>
      <h1>写真の撮り直し</h1>
      <p>管理者からの依頼</p>
    </div>
  </header>

  <div class="content">
    <div class="note-box">
      <div class="note-title">📋 管理者からのメモ</div>
      <div class="note-text" id="note-text">読み込み中...</div>
    </div>

    <div class="card">
      <div class="photo-area" id="photo-area">
        <div class="icon">📷</div>
        <div class="hint">タップして撮影</div>
        <input type="file" accept="image/*" capture="environment" onchange="onPhotoSelect(this)" />
      </div>
      <div class="retake-label" id="retake-label">写真を撮影してください</div>
    </div>
  </div>

  <div class="submit-area">
    <button class="submit-btn" id="submit-btn" disabled onclick="submitRetake()">
      写真を撮ってください
    </button>
  </div>
</div>

<!-- 完了画面 -->
<div id="done-screen">
  <div class="done-icon">✅</div>
  <h2>送信完了！</h2>
  <p>撮り直した写真を管理者に送りました。<br>ご確認をお待ちください。</p>
</div>

<!-- エラー画面 -->
<div id="error-screen">
  <div class="icon">⚠️</div>
  <p id="error-msg">URLが正しくありません。LINEのリンクから開いてください。</p>
</div>

<!-- ローディング -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-msg">送信中...</p>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzIEfUMpaOVsMcKOwEQnIIrDa_oqx2Cbz0DmeUKiacrAfsTr_ScoImhbJb8kgIXA2ls2Q/exec';

var params    = new URLSearchParams(window.location.search);
var recordId  = params.get('record_id');
var note      = params.get('note') || '';
var photoData = null;

window.onload = function() {
  if (!recordId) {
    show('error-screen');
    return;
  }
  document.getElementById('note-text').textContent = note || '（メモなし）';
};

function onPhotoSelect(input) {
  var file = input.files[0];
  if (!file) return;
  resizeImage(file, 1200, function(dataUrl) {
    photoData = { label: note || '撮り直し', dataUrl: dataUrl };
    var area = document.getElementById('photo-area');
    area.classList.add('taken');
    area.innerHTML = '<img src="' + dataUrl + '" alt="撮り直し写真">' +
      '<input type="file" accept="image/*" capture="environment" onchange="onPhotoSelect(this)" />';
    document.getElementById('retake-label').textContent = '✅ 撮影済み（タップで撮り直し）';
    var btn = document.getElementById('submit-btn');
    btn.disabled = false;
    btn.textContent = '📸 撮り直した写真を送信する';
  });
}

async function submitRetake() {
  if (!photoData) return;
  document.getElementById('loading-overlay').style.display = 'flex';

  try {
    var res  = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action:    'submit_retake',
        record_id: recordId,
        note:      note,
        photo:     photoData,
      })
    });
    var data = JSON.parse(await res.text());
    document.getElementById('loading-overlay').style.display = 'none';
    if (data.success) {
      show('done-screen');
    } else {
      alert('送信エラー: ' + (data.error || '不明なエラー'));
    }
  } catch(err) {
    document.getElementById('loading-overlay').style.display = 'none';
    alert('送信に失敗しました。\n' + err.message);
  }
}

function show(id) {
  ['main-screen', 'done-screen', 'error-screen'].forEach(function(s) {
    document.getElementById(s).style.display = (s === id) ? (id === 'main-screen' ? 'block' : 'flex') : 'none';
  });
}

function resizeImage(file, maxPx, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var ratio  = Math.min(maxPx / img.width, maxPx / img.height, 1);
      var canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      callback(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
